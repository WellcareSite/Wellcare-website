name: Blog Post Notification

on:
  push:
    branches: [main]
    paths:
      - 'src/blog/**.md'

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for new blog posts and notify
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get list of new blog post files added in this commit
          NEW_POSTS=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/blog/*.md' || true)
          
          if [ -z "$NEW_POSTS" ]; then
            echo "No new blog posts found — skipping notification"
            exit 0
          fi
          
          echo "New blog posts found:"
          echo "$NEW_POSTS"
          
          # Build the issue body
          BODY="A new blog post has been published on the WellCare website! 🎉"
          BODY="${BODY}\n\n### Published Posts\n"
          
          FIRST_TITLE=""
          for file in $NEW_POSTS; do
            TITLE=$(grep -m1 '^title:' "$file" | sed 's/title: *//;s/"//g')
            SLUG=$(basename "$file" .md)
            BODY="${BODY}\n- **${TITLE}** — [View Post](https://www.wellcareco.com/blog/${SLUG}/)"
            if [ -z "$FIRST_TITLE" ]; then
              FIRST_TITLE="$TITLE"
            fi
          done
          
          BODY="${BODY}\n\n---\n*This issue was automatically created by the blog notification workflow.*"
          
          # Create the GitHub Issue
          echo -e "$BODY" | gh issue create \
            --title "📝 New Blog Post: ${FIRST_TITLE}" \
            --body-file - \
            --label "blog-notification"
