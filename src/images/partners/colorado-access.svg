<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <!-- Colorado Access logo -->
  <!-- Heart with door -->
  <g transform="translate(30,10)">
    <!-- Heart shape -->
    <path d="M40,30 C40,15 20,5 10,20 C0,5 -20,15 -20,30 C-20,55 10,70 10,70 C10,70 40,55 40,30 Z" 
          fill="#2E8B57" transform="translate(40,0) scale(1.1)"/>
    <!-- Door -->
    <rect x="40" y="25" width="18" height="35" rx="2" fill="white"/>
    <rect x="42" y="27" width="14" height="15" rx="1" fill="#4CAF50"/>
    <circle cx="53" cy="48" r="2" fill="#2E8B57"/>
  </g>
  <!-- Text -->
  <text x="120" y="55" font-family="'Georgia', serif" font-size="28" font-style="italic" fill="#2E8B57">Colorado</text>
  <text x="120" y="95" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1565C0">ACCESS</text>
</svg>
