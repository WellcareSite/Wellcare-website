  <g transform="translate(35,10)">
    <circle cx="20" cy="25" r="8" fill="#7B2D8E"/>
    <circle cx="45" cy="10" r="6" fill="#2E8B57"/>
    <circle cx="45" cy="40" r="7" fill="#1565C0"/>
    <circle cx="5" cy="45" r="5" fill="#E91E63"/>
    <circle cx="35" cy="55" r="9" fill="#4CAF50"/>
